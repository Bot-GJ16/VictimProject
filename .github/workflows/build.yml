name: CI Build
on: [pull_request] 

jobs:
  build:
    runs-on: windows-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Ya latest version

      - name: Build Project
        run: |
          # line attacker file build
          dotnet build mega_exploit.proj
